# CI pipeline — runs fmt, clippy, test, MSRV check, and dependency policy in parallel.
#
# Actions pinned to full SHA for supply-chain safety (tags are mutable).
# To find the SHA for a new tag:  git ls-remote https://github.com/OWNER/REPO TAG
#
# Versions:
#   actions/checkout          https://github.com/actions/checkout/releases
#   dtolnay/rust-toolchain    https://github.com/dtolnay/rust-toolchain (branch-per-version)
#   Swatinem/rust-cache       https://github.com/Swatinem/rust-cache/releases
#   EmbarkStudios/cargo-deny  https://github.com/EmbarkStudios/cargo-deny-action/releases
#
# Concurrency: https://docs.github.com/en/actions/using-jobs/using-concurrency
# Permissions:  https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
---
name: CI

# Least-privilege — only read access; individual jobs don't need more
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'benches/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

# Cancel stale runs when a new push arrives on the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings  # treat warnings as errors in CI

jobs:
  # Formatting — runs on latest stable (not MSRV) because rustfmt
  # on older toolchains may not support edition 2024 formatting.
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd       # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Linting — runs on latest stable with clippy.toml msrv = "1.85.0"
  # so clippy won't suggest features unavailable on MSRV.
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd       # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd       # v6.0.2
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc    # v2.9.1
        # --locked: fail if Cargo.lock is out of date (reproducible builds)
        # --all-features: exercise feature-gated code (e.g. toml-config, filter)
      - run: cargo test --locked --all-features

  # Minimum Supported Rust Version — cargo check only (no clippy/fmt).
  # Keep toolchain version in sync with Cargo.toml rust-version and clippy.toml msrv.
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd       # v6.0.2
      - uses: dtolnay/rust-toolchain@c56a35af9328d0bc581dc86c05e58f97f7c38a0e # 1.85
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc    # v2.9.1
      - run: cargo check --locked

  # License, advisory, ban, and source checks via deny.toml.
  # Config reference: https://embarkstudios.github.io/cargo-deny/
  #
  # Advisories run separately with continue-on-error so a malformed
  # upstream advisory DB entry doesn't block the entire pipeline.
  deny:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        checks:
          - advisories
          - bans licenses sources
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: EmbarkStudios/cargo-deny-action@5b143841a37c3f676a9f7c1c8646cf093b04a0a3 # v2.0.16
        with:
          command: check
          command-arguments: ${{ matrix.checks }}
