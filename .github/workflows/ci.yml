---
name: CI

# DRIFT AUDIT:
#   Every pinned SHA has a comment indicating its known version.
#   Periodic audit required to align with upstream release cadences.
#
# Concurrency: https://docs.github.com/en/actions/using-jobs/using-concurrency
# Permissions:
#   https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication#permissions-for-the-github_token

"on":
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never    # plain text logs — no ANSI in CI output
  CARGO_TERM_QUIET: "true"
  CARGO_TERM_PROGRESS_WHEN: "never"
  RUSTFLAGS: -Dwarnings      # treat warnings as errors in CI
  RUSTUP_QUIET: "1"
  ACT: "false"  # Default for GHA; overridden by 'act' locally
  TAR_OPTIONS: "--use-compress-program=pigz"

jobs:
  # =========================================================================
  # TIER 1: VERIFICATION (ENVIRONMENT WARMING)
  # =========================================================================
  bootstrap:
    name: Environment Bootstrap (Alpine)
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - name: Alpine Speed Suite Bootstrap (Pre-Cache Requirement)
        run: |
          [ -d /var/lib/apk/repositories ] || apk update
          apk add nodejs tar pigz fd
          # Prioritize GNU Tar in /usr/local/bin to avoid recursive symlink hell in /bin
          mkdir -p /usr/local/bin
          [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
          [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
          tar --version
      - name: Generate Weekly Cache Buster
        id: buster
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Cache Master Environment
        id: cache-master
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
      - name: Warm Environment (Apk + Components)
        if: ${{ steps.cache-master.outputs.cache-hit != 'true' && env.ACT != 'true' }}
        run: |
          apk add -q --virtual .warmup-deps git build-base musl-dev perl \
            pkgconfig openssl-dev openssl-libs-static
          rustup component add rustfmt clippy llvm-tools-preview
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Warm Cargo Tools (Deny + Tarpaulin + Auditable)
        if: ${{ steps.cache-master.outputs.cache-hit != 'true' && env.ACT != 'true' }}
        env:
          CARGO_DENY_DIR: .cargo-deny-cache
        run: |
          # cargo-deny owns supply-chain policy in CI (advisories, licenses,
          # bans, sources). cargo-auditable wraps `cargo build` in the `build`
          # job so release binaries embed their full dep tree — `cargo audit
          # bin` consumes that at release time in prod.yml.
          #
          # cargo-audit itself is NOT installed in CI: deny's advisories
          # check uses the same RustSec DB, so running both doubles the
          # advisory-DB fetch without catching anything deny misses.
          cargo install cargo-deny cargo-tarpaulin cargo-auditable --locked || true
          cargo tarpaulin --version && cargo deny --version && cargo auditable --version
          cargo deny fetch

  # =========================================================================
  # TIER 2: VALIDATION (PARALLEL WORKERS)
  # =========================================================================
  fmt:
    name: fmt (Alpine)
    needs: [bootstrap]
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - name: Alpine Speed Suite Bootstrap (Pre-Cache Requirement)
        run: |
          [ -d /var/lib/apk/repositories ] || apk update
          apk add nodejs tar pigz fd
          # Prioritize GNU Tar in /usr/local/bin to avoid recursive symlink hell in /bin
          mkdir -p /usr/local/bin
          [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
          [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
          tar --version

      - name: Generate Weekly Cache Buster
        id: buster
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          fail-on-cache-miss: ${{ env.ACT != 'true' }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - run: cargo fmt --all --quiet -- --check

  # License, advisory, ban, and source checks via deny.toml.
  #
  # Supply-chain policy split:
  #
  #   CI (this workflow)          → cargo-deny  (advisories + licenses
  #                                              + bans + sources)
  #   Release (prod.yml)          → cargo audit bin (binary-provenance
  #                                              scan on compiled
  #                                              artifacts with their
  #                                              `.dep-v0` SBOM embedded
  #                                              by `cargo auditable`)
  #
  # cargo-deny is authoritative for lockfile-level checks — running
  # a parallel `cargo audit` here would double-fetch the RustSec
  # advisory-db for the same results. `cargo audit bin` at release
  # catches the different failure mode: a CVE lands on a transitive
  # dep that was in Cargo.lock-at-build-time, the lockfile was
  # updated pre-tag, but the staged binary still contains the old
  # tree. See prod.yml "Audit Release Binaries" step.
  deny:
    name: deny (Alpine)
    needs: [bootstrap]
    runs-on: ubuntu-latest
    container: rust:alpine
    env:
      CARGO_DENY_DIR: .cargo-deny-cache
    steps:
      - name: Alpine Speed Suite Bootstrap (Pre-Cache Requirement)
        run: |
          [ -d /var/lib/apk/repositories ] || apk update
          apk add nodejs tar pigz fd
          # Prioritize GNU Tar in /usr/local/bin to avoid recursive symlink hell in /bin
          mkdir -p /usr/local/bin
          [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
          [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
          tar --version

      - name: Generate Weekly Cache Buster
        id: buster
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          fail-on-cache-miss: ${{ env.ACT != 'true' }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: EmbarkStudios/cargo-deny-action@91bf2b620e09e18d6eb78b92e7861937469acedb  # v2.0.17
        with:
          command: check
          log-level: warn

  # Linting — runs on latest stable
  # act -s GITHUB_TOKEN="$(gh auth token)" -j clippy
  clippy:
    name: clippy (Alpine)
    needs: [bootstrap]
    runs-on: ubuntu-latest
    container: rust:alpine
    steps:
      - name: Alpine Speed Suite Bootstrap (Pre-Cache Requirement)
        run: |
          [ -d /var/lib/apk/repositories ] || apk update
          apk add nodejs tar pigz fd
          # Prioritize GNU Tar in /usr/local/bin to avoid recursive symlink hell in /bin
          mkdir -p /usr/local/bin
          [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
          [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
          tar --version

      - name: Generate Weekly Cache Buster
        id: buster
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          fail-on-cache-miss: ${{ env.ACT != 'true' }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-directories: |
            ~/.rustup
      - run: cargo clippy --quiet --all-targets --all-features -- -D warnings

  # Minimum Supported Rust Version
  msrv:
    name: msrv (Alpine)
    needs: [bootstrap]
    runs-on: ubuntu-latest
    container: rust:1.85-alpine
    env:
      RUSTUP_QUIET: 1
    steps:
      - name: Alpine Speed Suite Bootstrap (Pre-Cache Requirement)
        run: |
          [ -d /var/lib/apk/repositories ] || apk update
          apk add nodejs tar pigz fd
          # Prioritize GNU Tar in /usr/local/bin to avoid recursive symlink hell in /bin
          mkdir -p /usr/local/bin
          [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
          [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
          tar --version

      - name: Generate Weekly Cache Buster
        id: buster
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment (Apk Only)
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-master-env-
      - name: Alpine CI Bootstrap (Speed Suite + Git)
        run: apk add -q --virtual .ci-deps git build-base musl-dev
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-directories: |
            ~/.rustup
      - name: Verify MSRV Compilation & Cleanup
        run: |
          cargo check --quiet --locked --all-targets --features toml-config,distill-ansi-cli
          apk del -q .ci-deps

  # Test matrix
  test:
    needs: [bootstrap]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    env:
      RUSTUP_QUIET: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine (musl)
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            container: rust:alpine
          - name: debian (glibc)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            container: rust:latest
          - name: ubuntu (native)
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            container: ubuntu:latest
          - name: macos
            os: macos-latest
            target: aarch64-apple-darwin
            container: ''
            skip_local: true
          - name: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            container: ''
            skip_local: true
    container: ${{ matrix.container }}
    steps:
      - name: Container Speed Suite Bootstrap (Pre-Cache Requirement)
        if: ${{ matrix.container != '' && (!matrix.skip_local || env.ACT != 'true') }}
        run: |
          if [ -f /etc/alpine-release ]; then
            [ -d /var/lib/apk/repositories ] || apk update
            apk add nodejs tar pigz fd
            mkdir -p /usr/local/bin
            [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
            [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
            tar --version
          else
            apt-get update -qq && apt-get install -y -qq curl nodejs tar pigz fd-find
            ln -sf /usr/bin/fdfind /usr/local/bin/fd
          fi
      - name: Generate Weekly Cache Buster
        id: buster
        shell: sh
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment (Alpine Only)
        if: matrix.container == 'rust:alpine'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          fail-on-cache-miss: ${{ env.ACT != 'true' }}
      - name: Alpine CI Bootstrap (Speed Suite + Git)
        if: matrix.container == 'rust:alpine'
        run: apk add -q --virtual .ci-deps git build-base musl-dev
      - name: Debian CI Bootstrap (Git + Toolchain)
        if: matrix.container == 'rust:latest' || matrix.container == 'ubuntu:latest'
        run: |
          apt-get update -qq
          apt-get install -y git gcc g++
          cc --version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: ${{ !matrix.skip_local || env.ACT != 'true' }}
        with:
          fetch-depth: 1
      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl' && matrix.container == 'ubuntu:latest'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # master
        if: ${{ (matrix.container == '' || matrix.container == 'ubuntu:latest') && (!matrix.skip_local || env.ACT != 'true') }}
        with:
          targets: ${{ matrix.target }}
          profile: minimal
        env:
          RUSTUP_QUIET: "1"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-directories: |
            ~/.rustup
      - name: Run Tests
        if: ${{ !matrix.skip_local || env.ACT != 'true' }}
        shell: sh
        run: cargo test --quiet --locked --all-features --target ${{ matrix.target }}
      - name: Alpine Cleanup
        if: matrix.container == 'rust:alpine'
        run: apk del -q .ci-deps

  # Coverage enforcement
  diff-coverage:
    name: diff-coverage (Alpine)
    needs: [bootstrap]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: rust:alpine
    steps:
      - name: Alpine Speed Suite Bootstrap (Pre-Cache Requirement)
        run: |
          [ -d /var/lib/apk/repositories ] || apk update
          apk add nodejs tar pigz fd
          # Prioritize GNU Tar in /usr/local/bin to avoid recursive symlink hell in /bin
          mkdir -p /usr/local/bin
          [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
          [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
          tar --version
      - name: Generate Weekly Cache Buster
        id: buster
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          fail-on-cache-miss: ${{ env.ACT != 'true' }}
      - name: Alpine CI Bootstrap (Speed Suite + Git)
        run: |
          apk add -q --virtual .ci-deps git build-base musl-dev perl pkgconfig openssl-dev openssl-libs-static

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-directories: |
            ~/.rustup
      - name: Generate Coverage (XML) & Cleanup
        if: ${{ !env.ACT }}
        run: |
          env RUST_LOG=warn cargo tarpaulin \
            --quiet \
            --color never \
            --skip-clean \
            --target-dir target/tarpaulin \
            --engine llvm \
            --out Xml
          apk del -q .ci-deps
      - name: Install uv
        if: ${{ !env.ACT }}
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Enforce Diff Coverage
        if: ${{ !env.ACT }}
        run: |
          uvx diff-cover target/tarpaulin/cobertura.xml \
            --no-color --compare-branch=origin/main --fail-under=95

  # STAGING LAYER
  build:
    needs: [bootstrap, test, clippy, fmt, deny, msrv, diff-coverage]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      RUSTUP_QUIET: 1
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: alpine-x64
            target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            container: rust:alpine
          - name: debian-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: rust:latest
          - name: ubuntu-x64
            target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            container: ubuntu:latest
          - name: macos-x64
            target: aarch64-apple-darwin
            os: macos-latest
            container: ''
            skip_local: true
          - name: windows-x64
            target: x86_64-pc-windows-msvc
            os: windows-latest
            container: ''
            skip_local: true
    container: ${{ matrix.container }}
    steps:
      - name: Container Speed Suite Bootstrap (Pre-Cache Requirement)
        if: ${{ matrix.container != '' && (!matrix.skip_local || env.ACT != 'true') }}
        run: |
          if [ -f /etc/alpine-release ]; then
            [ -d /var/lib/apk/repositories ] || apk update
            apk add nodejs tar pigz fd
            mkdir -p /usr/local/bin
            [ -f /usr/bin/tar ] && ln -sf /usr/bin/tar /usr/local/bin/tar
            [ -f /bin/tar ] && ln -sf /bin/tar /usr/local/bin/tar
            tar --version
          else
            apt-get update -qq && apt-get install -y -qq curl nodejs tar pigz fd-find
            ln -sf /usr/bin/fdfind /usr/local/bin/fd
          fi
      - name: Generate Weekly Cache Buster
        id: buster
        shell: sh
        run: echo "week=$(date +'%Y-%U')" >> $GITHUB_OUTPUT
      - name: Restore Master Environment (Alpine Only)
        if: matrix.container == 'rust:alpine'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/lib/apk
            /var/cache/apk
            /usr/local/rustup
            /usr/local/cargo/bin
            .cargo-deny-cache
          key: ${{ runner.os }}-master-env-${{ steps.buster.outputs.week }}
          fail-on-cache-miss: ${{ env.ACT != 'true' }}
      - name: Alpine CI Bootstrap (Speed Suite + Git)
        if: matrix.container == 'rust:alpine'
        run: apk add -q --virtual .ci-deps git build-base musl-dev
      - name: Debian CI Bootstrap (Git + Toolchain)
        if: matrix.container == 'rust:latest' || matrix.container == 'ubuntu:latest'
        run: |
          apt-get update -qq
          apt-get install -y git gcc g++
          cc --version
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        if: ${{ !matrix.skip_local || env.ACT != 'true' }}
        with:
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # master
        if: ${{ (matrix.container == '' || matrix.container == 'ubuntu:latest') && (!matrix.skip_local || env.ACT != 'true') }}
        with:
          targets: ${{ matrix.target }}
          profile: minimal
        env:
          RUSTUP_QUIET: "1"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          cache-all-crates: true
      - name: Install cargo-auditable (non-Alpine)
        # Alpine gets cargo-auditable from the weekly-warmed bootstrap
        # cache. All other containers install pre-built binaries via
        # taiki-e/install-action (~2s, no compilation).
        #
        # DRIFT AUDIT: https://github.com/taiki-e/install-action/releases
        if: matrix.container != 'rust:alpine' && (!matrix.skip_local || env.ACT != 'true')
        uses: taiki-e/install-action@3fa6878dc4ae603f73960271565a082bf196ab96  # v2.77.2
        with:
          tool: cargo-auditable
      - name: Ensure cargo-auditable (Alpine cache fallback)
        if: matrix.container == 'rust:alpine'
        run: command -v cargo-auditable || cargo install cargo-auditable --locked
      - name: Cargo Build Release (with auditable dep-tree embedded)
        shell: sh
        # `cargo auditable build` is a thin wrapper: it builds via cargo
        # as usual, then embeds a compressed SBOM (the Cargo.lock graph)
        # into a `.dep-v0` section of each binary. Release-time
        # `cargo audit bin` reads that section to scan the deps that
        # actually shipped. Zero runtime cost — section is not loaded.
        # Overhead: ~1s per binary, negligible vs. the full release build.
        run: cargo auditable build --locked --release --all-features --target ${{ matrix.target }}
      - name: Alpine Cleanup
        if: matrix.container == 'rust:alpine'
        run: apk del -q .ci-deps
      - name: Stage Artifacts
        shell: sh
        run: |
          mkdir -p dist/
          EXT=""
          case "${{ matrix.target }}" in *windows*) EXT=".exe" ;; esac
          cp target/${{ matrix.target }}/release/strip-ansi${EXT} dist/strip-ansi-${{ matrix.name }}${EXT}
          cp target/${{ matrix.target }}/release/distill-ansi${EXT} dist/distill-ansi-${{ matrix.name }}${EXT}
      - name: Upload Staging Artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: distill-strip-ansi-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7
