---
name: Production Promotion

# Triggers:
# 1. Manually via workflow_dispatch (Promotion from Staging)
# 2. Automatically via semver tags (Canonical Release)
"on":
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI Run ID to promote'
        required: true
  push:
    tags:
      - 'v*.*.*'

# DRIFT AUDIT:
#   https://github.com/actions/checkout/releases
#   https://github.com/actions/download-artifact/releases
#   https://github.com/softprops/action-gh-release/releases

permissions:
  contents: write
  packages: write

jobs:
  promote:
    name: Promote Staging to Production
    runs-on: ubuntu-latest
    environment: production     # HUMAN-IN-THE-LOOP: Requires manual approval in GitHub UI
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve Run ID
        id: run_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(gh run list --workflow CI \
              --commit ${{ github.sha }} \
              --status success \
              --limit 1 \
              --json databaseId -q '.[0].databaseId')
            echo "id=$RUN_ID" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all Staging Artifacts
        uses: dawidd6/action-download-artifact@b6e2e70617bc3265edd6dab6c906732b2f1ae151  # v21
        with:
          workflow: ci.yml
          run_id: ${{ steps.run_info.outputs.id }}
          path: artifacts/

      - name: Install Speed Suite (Host)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fd-find pigz
          sudo ln -sf /usr/bin/fdfind /usr/local/bin/fd

      - name: Consolidate Binaries
        shell: bash
        run: |
          mkdir -p dist/
          fd "strip-ansi" artifacts/ -x cp {} dist/
          fd "distill-ansi" artifacts/ -x cp {} dist/
          ls -R dist/

      - name: Install cargo-audit (binary-provenance scan)
        # Used only here in prod.yml, not in PR CI. deny.toml owns
        # lockfile-level advisory / license / ban / source checks in
        # the CI workflow; `cargo audit bin` here scans the compiled
        # binaries built with `cargo auditable build` — i.e. what
        # actually shipped — and fails the release if a CVE lands on
        # a dependency that's baked into the artifact.
        #
        # DRIFT AUDIT: https://github.com/taiki-e/install-action/releases
        uses: taiki-e/install-action@3fa6878dc4ae603f73960271565a082bf196ab96  # v2.77.2
        with:
          tool: cargo-audit

      - name: Audit Release Binaries
        shell: bash
        # `cargo audit bin` reads the `.dep-v0` section embedded by
        # `cargo auditable build` in the CI build job. It scans each
        # platform's release binary against the RustSec advisory DB.
        # Fails the release on any advisory — matches CI's deny policy.
        #
        # Linux binaries are ELF (readable on ubuntu-latest); macOS
        # binaries are Mach-O (cargo-audit handles both); Windows PE
        # is also supported. Skip-on-unsupported is explicit so a
        # format-parse failure surfaces as a release failure rather
        # than silent passthrough.
        run: |
          set -euo pipefail
          fail=0
          for bin in dist/*; do
            # Skip non-executables (if any made it through).
            [ -f "$bin" ] || continue
            case "$bin" in
              *.sh|*.txt|*.md) continue ;;
            esac
            echo "::group::Auditing $(basename "$bin")"
            if ! cargo audit bin "$bin"; then
              fail=1
              echo "::error::cargo audit bin failed for $bin"
            fi
            echo "::endgroup::"
          done
          exit $fail

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Build & Push Alpine Container
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          cp dist/strip-ansi-alpine-x64 strip-ansi
          cp dist/distill-ansi-alpine-x64 distill-ansi
          chmod +x strip-ansi distill-ansi

          cat << 'EOF' > Dockerfile
          FROM alpine:latest
          RUN apk add --no-cache -q ca-certificates
          COPY strip-ansi /usr/local/bin/strip-ansi
          COPY distill-ansi /usr/local/bin/distill-ansi
          ENTRYPOINT ["/usr/local/bin/strip-ansi"]
          EOF

          IMAGE="ghcr.io/${{ github.repository_owner }}/distill-strip-ansi"
          TAG="${GITHUB_REF_NAME}"
          echo "Building ${IMAGE}:${TAG}..."
          docker build -q -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .

           # To enable actual push:
           # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
           # docker push "${IMAGE}:${TAG}"
           # docker push "${IMAGE}:latest"
