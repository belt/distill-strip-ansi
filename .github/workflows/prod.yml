---
name: Production Promotion

# Triggers:
# 1. Manually via workflow_dispatch (Promotion from Staging)
# 2. Automatically via semver tags (Canonical Release)
"on":
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI Run ID to promote'
        required: true
  push:
    tags:
      - 'v*.*.*'

# DRIFT AUDIT:
#   https://github.com/actions/checkout/releases
#   https://github.com/actions/download-artifact/releases
#   https://github.com/softprops/action-gh-release/releases

permissions:
  contents: write
  packages: write

jobs:
  promote:
    name: Promote Staging to Production
    runs-on: ubuntu-latest
    environment: production     # HUMAN-IN-THE-LOOP: Requires manual approval in GitHub UI
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Resolve Run ID
        id: run_info
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "id=${{ github.event.inputs.run_id }}" >> $GITHUB_OUTPUT
          else
            RUN_ID=$(gh run list --workflow CI \
              --commit ${{ github.sha }} \
              --status success \
              --limit 1 \
              --json databaseId -q '.[0].databaseId')
            echo "id=$RUN_ID" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all Staging Artifacts
        uses: dawidd6/action-download-artifact@07cd6d84832f030f7c63b5031f5e23f0577da59a  # v3
        with:
          workflow: ci.yml
          run_id: ${{ steps.run_info.outputs.id }}
          path: artifacts/

      - name: Install Speed Suite (Host)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq fd-find pigz
          sudo ln -sf /usr/bin/fdfind /usr/local/bin/fd

      - name: Consolidate Binaries
        shell: bash
        run: |
          mkdir -p dist/
          fd "strip-ansi" artifacts/ -x cp {} dist/
          fd "distill-ansi" artifacts/ -x cp {} dist/
          ls -R dist/

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Build & Push Alpine Container
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          cp dist/strip-ansi-alpine-x64 strip-ansi
          cp dist/distill-ansi-alpine-x64 distill-ansi
          chmod +x strip-ansi distill-ansi

          cat << 'EOF' > Dockerfile
          FROM alpine:latest
          RUN apk add --no-cache -q ca-certificates
          COPY strip-ansi /usr/local/bin/strip-ansi
          COPY distill-ansi /usr/local/bin/distill-ansi
          ENTRYPOINT ["/usr/local/bin/strip-ansi"]
          EOF

          IMAGE="ghcr.io/${{ github.repository_owner }}/distill-strip-ansi"
          TAG="${GITHUB_REF_NAME}"
          echo "Building ${IMAGE}:${TAG}..."
          docker build -q -t "${IMAGE}:${TAG}" -t "${IMAGE}:latest" .

           # To enable actual push:
           # echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
           # docker push "${IMAGE}:${TAG}"
           # docker push "${IMAGE}:latest"
