# Mathematical Alphanumeric Symbols — Greek letters
#
# Styled Greek letter variants used in mathematical/scientific notation.
# Maps all styled forms back to base Greek U+0391-03C9.
# Includes variant forms: ϵ(03F5), ϑ(03D1), ϰ(03F0), ϕ(03D5), ϱ(03F1), ϖ(03D6).
# Also includes ∇(2207) nabla and ∂(2202) partial differential.
#
# Source: Unicode block U+1D6A8-U+1D7CB
# Reference: https://en.wikipedia.org/wiki/Mathematical_Alphanumeric_Symbols

[metadata]
type = "math_greek"
description = "Styled Greek letters → base Greek alphabet"
direction = "neutral"
tags = ["math", "canonicalize"]

# ── Bold Greek ───────────────────────────────────────────────────────
# Uppercase: U+1D6A8-1D6C0 → Α-Ω (U+0391-03A9)
[[ranges]]
from_start = "1D6A8"
from_end = "1D6C0"
to_start = "0391"

# Bold nabla: U+1D6C1 → ∇ U+2207
[[pairs]]
from = "1D6C1"
to = "2207"

# Lowercase: U+1D6C2-1D6DA → α-ω (U+03B1-03C9)
