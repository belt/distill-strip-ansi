# Enclosed CJK Letters and Months
#
# Parenthesized and circled forms of Hangul, Katakana, and CJK
# ideographs. Maps to their compatibility decompositions.
#
# Source: Unicode block U+3200-U+32FF
# Reference: https://en.wikipedia.org/wiki/Enclosed_CJK_Letters_and_Months
#
# Subranges:
#   3200-321E  Parenthesized Hangul → compatibility jamo sequences
#   3220-3247  Parenthesized CJK ideographs → single ideographs
#   3248-324F  Circled numbers 10-80 (CJK) → digit sequences
#   3250       Partnership sign → special
#   3251-325F  Circled numbers 21-35 → digit sequences
#   3260-327E  Circled Hangul → compatibility jamo
#   3280-32B0  Circled CJK ideographs → single ideographs
#   32B1-32BF  Circled numbers 36-50 → digit sequences
#   32C0-32CB  Ideographic telegraph months → digit + 月
#   32D0-32FE  Circled Katakana → standard katakana
#   32FF       Square era name Reiwa → 令和
#
# NOTE: This file contains a representative subset. The complete
# mapping (~255 entries) should be generated from UnicodeData.txt.
#
#   awk -F';' '$1 ~ /^32[0-9A-F]/ && $6 != "" {
#     split($6, a, " "); target="";
#     for (i in a) { if (a[i] !~ /^</) target = target " " a[i] }
#     gsub(/^ /, "", target);
#     if (target ~ / /)
#       print "[[pairs]]\nfrom = \"" $1 "\"\nto_seq = \"" target "\"\n"
#     else if (target != "")
#       print "[[pairs]]\nfrom = \"" $1 "\"\nto = \"" target "\"\n"
#   }' UnicodeData.txt

[metadata]
type = "enclosed_cjk"
description = "Enclosed CJK Letters and Months → base forms"
direction = "neutral"
tags = ["cjk", "japanese", "korean", "canonicalize"]

