# ── Truncated for maintainability ────────────────────────────────────
#
# The complete mapping contains ~460 entries covering F900-FAD9.
# This file includes the first 80 entries (F900-F94F) as a
# verified reference subset.
#
# To generate the complete file from the Unicode Character Database:
#
#   curl -sO https://unicode.org/Public/UNIDATA/UnicodeData.txt
#   awk -F';' '$1 ~ /^F9/ || $1 ~ /^FA[0-9A-D]/ {
#     if ($6 != "") print "[[pairs]]\nfrom = \"" $1 "\"\nto = \"" $6 "\"\n"
#   }' UnicodeData.txt
#
# The awk command extracts canonical decomposition mappings (field 6)
# for codepoints in the F900-FAD9 range. Entries where field 6 is
# empty are unified ideographs (not compatibility) and should be
# excluded.
