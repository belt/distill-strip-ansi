# CJK Compatibility Ideographs
#
# Compatibility ideographs that have canonical decompositions to
# CJK Unified Ideographs. These exist solely for round-trip
# compatibility with legacy East Asian encodings (KS X 1001,
# JIS X 0213, CNS 11643, etc.).
#
# Each entry maps a compatibility ideograph to its canonical
# unified equivalent as defined by Unicode's canonical
# decomposition mapping.
#
# Source: Unicode block U+F900-U+FAD9
# Reference: https://unicode.org/charts/nameslist/n_F900.html
# Authoritative source: UnicodeData.txt field 5 (decomposition mapping)
#
# ~12 codepoints in this range are actually unified ideographs
# (no decomposition mapping) and are excluded.
#
# NOTE: This file contains a representative subset. The complete
# mapping (~460 entries) should be generated from the Unicode
# Character Database (UnicodeData.txt) using the canonical
# decomposition field for codepoints in F900-FAD9.
# A generation script is provided at bin/generate-cjk-compat.sh.

[metadata]
type = "cjk_compat_ideographs"
description = "CJK Compatibility Ideographs → CJK Unified Ideographs"
direction = "neutral"
tags = ["cjk", "japanese", "korean", "canonicalize"]

