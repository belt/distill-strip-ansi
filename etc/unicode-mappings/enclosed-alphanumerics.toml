# Enclosed Alphanumerics — circled/parenthesized numbers and letters
#
# Decorative enclosed forms of numbers and letters used in lists,
# annotations, and formatted output. Maps to plain equivalents.
#
# Excludes circled A-Z (U+24B6-24CF) and a-z (U+24D0-24E9)
# which are compiled-in builtins.
#
# Source: Unicode block U+2460-U+24FF
# Reference: https://en.wikipedia.org/wiki/Enclosed_Alphanumerics
#
# Numbers >9 decompose to multi-character sequences (to_seq).

[metadata]
type = "enclosed_alphanumerics"
description = "Circled and parenthesized numbers → plain digits"
direction = "narrowing"
tags = ["ascii-normalize", "canonicalize"]

