# CJK Compatibility — Square Katakana Words and Abbreviations
#
# Square symbols embedding Japanese Katakana words (U+3300-337F)
# and Latin/CJK abbreviations (U+3380-33FF). Each decomposes to
# a multi-codepoint Katakana or Latin sequence.
#
# Source: Unicode block U+3300-U+33FF
# Reference: https://en.wikipedia.org/wiki/CJK_Compatibility
#
# NOTE: All entries have multi-codepoint targets (to_seq).
# This file contains a representative subset. The complete
# mapping (~256 entries) should be generated from UnicodeData.txt.
#
#   awk -F';' '$1 ~ /^33[0-9A-F]/ && $6 != "" {
#     split($6, a, " "); target="";
#     for (i in a) { if (a[i] !~ /^</) target = target " " a[i] }
#     gsub(/^ /, "", target);
#     if (target != "")
#       print "[[pairs]]\nfrom = \"" $1 "\"\nto_seq = \"" target "\"\n"
#   }' UnicodeData.txt

[metadata]
type = "cjk_compatibility"
description = "CJK Compatibility square forms → Katakana/Latin sequences"
direction = "narrowing"
tags = ["japanese", "cjk", "canonicalize"]

# ── Square Katakana words (3300-337F) ────────────────────────────────
# Each decomposes to a sequence of standard Katakana characters.

