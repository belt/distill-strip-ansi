# ── Halfwidth dakuten / handakuten ───────────────────────────────────
# These map to combining marks. A preceding kana + dakuten sequence
# should ideally compose (e.g. ｶﾞ → ガ), but single-char mapping
# to the combining mark is the correct NFKC decomposition.

# U+FF9E ﾞ → U+3099 (combining dakuten)
[[pairs]]
from = "FF9E"
to = "3099"

# U+FF9F ﾟ → U+309A (combining handakuten)
[[pairs]]
from = "FF9F"
to = "309A"

