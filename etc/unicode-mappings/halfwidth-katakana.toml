# Halfwidth Katakana and Halfwidth Symbols
#
# Halfwidth forms from JIS X 0201 legacy encoding mapped to their
# standard-width Unicode equivalents. Essential for Japanese text
# normalization when processing legacy terminal/mainframe output.
#
# Includes halfwidth symbols (U+FFE8-FFEE) — box drawing and arrows
# from the same legacy encoding context.
#
# Source: Unicode block U+FF61-U+FF9F, U+FFE8-U+FFEE
# Reference: https://en.wikipedia.org/wiki/Halfwidth_and_Fullwidth_Forms_(Unicode_block)
#
# Note: direction is "widening" — halfwidth (1 col) → standard (2 col).
# These are canonical forms; the halfwidth variants exist only for
# JIS X 0201 round-trip compatibility.

[metadata]
type = "halfwidth_katakana"
description = "Halfwidth Katakana and symbols → standard-width equivalents"
direction = "widening"
tags = ["japanese", "legacy-encoding", "canonicalize"]

# ── Halfwidth CJK punctuation ────────────────────────────────────────

# U+FF61 ｡ → U+3002 。 (ideographic full stop)
[[pairs]]
from = "FF61"
to = "3002"

# U+FF62 ｢ → U+300C 「 (left corner bracket)
[[pairs]]
from = "FF62"
to = "300C"

