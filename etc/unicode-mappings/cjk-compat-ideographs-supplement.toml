# CJK Compatibility Ideographs Supplement
#
# Compatibility ideographs in the Supplementary Ideographic Plane,
# primarily for CNS 11643 round-trip compatibility. Each has a
# canonical decomposition to a CJK Unified Ideograph.
#
# Source: Unicode block U+2F800-U+2FA1F
# Reference: https://unicode.org/charts/nameslist/n_2F800.html
#
# NOTE: This file contains a representative subset (first 40 entries).
# The complete mapping (~542 entries) should be generated from
# UnicodeData.txt:
#
#   awk -F';' '$1 ~ /^2F[89A]/ && $6 != "" {
#     print "[[pairs]]\nfrom = \"" $1 "\"\nto = \"" $6 "\"\n"
#   }' UnicodeData.txt

