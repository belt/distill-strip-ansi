# Mathematical Alphanumeric Symbols — Latin letters and digits
#
# Styled Latin letter/digit variants used in mathematical notation.
# Commonly abused for social media "fancy text" and spam filter evasion.
# Maps all styled forms back to plain ASCII A-Z, a-z, 0-9.
#
# Excludes Bold A-Z/a-z (U+1D400-1D433) which are compiled-in builtins.
#
# Source: Unicode block U+1D400-U+1D7FF
# Reference: https://en.wikipedia.org/wiki/Mathematical_Alphanumeric_Symbols
#
# ~24 codepoints in Script/Fraktur/Double-struck are holes (reserved)
# because those characters live in the Letterlike Symbols block
# (U+2100-214F). Those are listed as individual pairs at the end.

[metadata]
type = "math_latin"
description = "Styled Latin letters and digits → plain ASCII"
direction = "narrowing"
tags = ["math", "canonicalize", "ascii-normalize"]

# ── Italic ───────────────────────────────────────────────────────────
# U+1D434-1D44D → A-Z (uppercase italic)
# Note: U+1D455 (italic small h) is a hole → ℎ U+210E is in Letterlike Symbols

[[ranges]]
from_start = "1D434"
from_end = "1D44D"
to_start = "0041"

# U+1D44E-1D454 → a-g (lowercase italic, before hole)
[[ranges]]
from_start = "1D44E"
from_end = "1D454"
to_start = "0061"

# U+1D456-1D467 → i-z (lowercase italic, after hole at 1D455)
[[ranges]]
from_start = "1D456"
from_end = "1D467"
to_start = "0069"


# ── Bold Italic ──────────────────────────────────────────────────────
# U+1D468-1D481 → A-Z
[[ranges]]
from_start = "1D468"
from_end = "1D481"
to_start = "0041"

# U+1D482-1D49B → a-z
[[ranges]]
from_start = "1D482"
from_end = "1D49B"
to_start = "0061"

