# Arabic Presentation Forms A and B
#
# Contextual forms (isolated, initial, medial, final) and ligatures
# of Arabic letters. Maps to base Arabic characters.
#
# Source: Unicode blocks U+FB50-U+FDFF (Forms-A) and U+FE70-U+FEFF (Forms-B)
# Reference: https://en.wikipedia.org/wiki/Arabic_Presentation_Forms-A
#            https://en.wikipedia.org/wiki/Arabic_Presentation_Forms-B
#
# Forms-A (FB50-FDFF): 631 assigned, contextual forms + ligatures
#   for Persian, Urdu, Sindhi, Central Asian languages.
# Forms-B (FE70-FEFF): 141 assigned, spacing forms of Arabic
#   diacritics and contextual letter forms.
#
# NOTE: This file contains a representative subset of Forms-B
# (the most commonly encountered block). The complete mapping
# (~770 entries across both blocks) should be generated from
# UnicodeData.txt:
#
#   awk -F';' '($1 ~ /^FB[5-9A-F]/ || $1 ~ /^F[CD]/ || $1 ~ /^FE[7-F]/) && $6 != "" {
#     split($6, a, " "); target="";
#     for (i in a) { if (a[i] !~ /^</) target = target " " a[i] }
#     gsub(/^ /, "", target);
#     if (target ~ / /)
#       print "[[pairs]]\nfrom = \"" $1 "\"\nto_seq = \"" target "\"\n"
#     else if (target != "")
#       print "[[pairs]]\nfrom = \"" $1 "\"\nto = \"" target "\"\n"
#   }' UnicodeData.txt

[metadata]
type = "arabic_presentation_forms"
description = "Arabic Presentation Forms → base Arabic characters"
direction = "neutral"
tags = ["arabic", "canonicalize"]

